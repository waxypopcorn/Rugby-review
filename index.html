<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>U9 Rugby Self Review</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #e8f5e9 0%, #e3f2fd 100%);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 16px;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const FORMSPREE_URL = "https://formspree.io/f/mnjyldda";

const sections = [
  {
    id: "effort", emoji: "💪", title: "Did I try my best?",
    color: "#e8f5e9", accent: "#2e7d32",
    questions: [
      { id: "q1", text: "I worked hard in training and in games", type: "emoji" },
      { id: "q2", text: "I kept going even when it was tough", type: "emoji" },
      { id: "q3", text: "I listened to my coach", type: "emoji" },
    ],
  },
  {
    id: "improving", emoji: "📈", title: "Am I getting better?",
    color: "#e3f2fd", accent: "#1565c0",
    questions: [
      { id: "q4", text: "Something I can do now that I couldn't do at the start of the season:", type: "text", placeholder: "e.g. catch the ball better, run faster..." },
      { id: "q5", text: "One thing I want to get better at before the season ends:", type: "text", placeholder: "e.g. passing, tackling..." },
      { id: "q6", text: "I practice at home, not just at training", type: "emoji" },
    ],
  },
  {
    id: "teammate", emoji: "🤝", title: "Being a good teammate",
    color: "#fff3e0", accent: "#e65100",
    questions: [
      { id: "q7", text: "I cheer for my teammates when they do well", type: "emoji" },
      { id: "q8", text: "I include everyone and make sure no one feels left out", type: "emoji" },
      { id: "q9", text: "If a teammate makes a mistake, I am kind to them", type: "emoji" },
    ],
  },
  {
    id: "feelings", emoji: "😄", title: "How do I feel playing rugby?",
    color: "#f3e5f5", accent: "#6a1b9a",
    questions: [
      { id: "q10", text: "I enjoy coming to training and games", type: "emoji" },
      { id: "q11", text: "Is there anything about rugby that I find tricky or worrying?", type: "text", placeholder: "You can write anything here, it's just for you..." },
      { id: "q12", text: "My favourite part of playing rugby is:", type: "text", placeholder: "e.g. scoring tries, being with my friends..." },
    ],
  },
  {
    id: "fairplay", emoji: "🏉", title: "Being fair and respectful",
    color: "#fce4ec", accent: "#880e4f",
    questions: [
      { id: "q13", text: "I shake hands and say well done to the other team", type: "emoji" },
      { id: "q14", text: "I listen when the referee makes a decision", type: "emoji" },
      { id: "q15", text: "I behave well on the sideline when I'm not playing", type: "emoji" },
    ],
  },
  {
    id: "proud", emoji: "⭐", title: "My proudest moment",
    color: "#fffde7", accent: "#f57f17",
    questions: [
      { id: "q16", text: "Something I'm really proud of this season:", type: "text", placeholder: "Big or small — it all counts!" },
    ],
  },
];

const emojiOptions = [
  { value: "Always", label: "Always", icon: "😄" },
  { value: "Sometimes", label: "Sometimes", icon: "😊" },
  { value: "Not yet", label: "Not yet", icon: "😅" },
];

const questionLabels = {
  q1: "Worked hard in training and games", q2: "Kept going when it was tough",
  q3: "Listened to my coach", q4: "Something I can do now that I couldn't before",
  q5: "One thing I want to get better at", q6: "I practice at home",
  q7: "I cheer for my teammates", q8: "I include everyone",
  q9: "I am kind when teammates make mistakes", q10: "I enjoy coming to training and games",
  q11: "Something tricky or worrying about rugby", q12: "My favourite part of playing rugby",
  q13: "I shake hands with the other team", q14: "I listen to the referee",
  q15: "I behave well on the sideline", q16: "Something I'm really proud of this season",
};

function App() {
  const [playerName, setPlayerName] = useState("");
  const [answers, setAnswers] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [sending, setSending] = useState(false);
  const [error, setError] = useState("");
  const [currentSection, setCurrentSection] = useState(0);

  const setAnswer = (id, value) => setAnswers(a => ({ ...a, [id]: value }));

  const allAnswered = () => {
    for (const s of sections)
      for (const q of s.questions)
        if (!answers[q.id] || answers[q.id].trim() === "") return false;
    return playerName.trim() !== "";
  };

  const progress = () => {
    let total = 1, done = playerName.trim() !== "" ? 1 : 0;
    for (const s of sections)
      for (const q of s.questions) { total++; if (answers[q.id] && answers[q.id].trim() !== "") done++; }
    return Math.round((done / total) * 100);
  };

  const handleSubmit = async () => {
    if (!allAnswered()) return;
    setSending(true); setError("");
    const payload = { "Player Name": playerName };
    for (const s of sections)
      for (const q of s.questions)
        payload[questionLabels[q.id]] = answers[q.id];
    try {
      const res = await fetch(FORMSPREE_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json", Accept: "application/json" },
        body: JSON.stringify(payload),
      });
      if (res.ok) setSubmitted(true);
      else { const d = await res.json(); setError(d?.error || "Something went wrong."); }
    } catch { setError("Could not send — please check your internet connection."); }
    finally { setSending(false); }
  };

  const section = sections[currentSection];
  const isLast = currentSection === sections.length - 1;
  const sectionComplete = () => section.questions.every(q => answers[q.id] && answers[q.id].trim() !== "");

  const cardStyle = { background: "#fff", borderRadius: 20, boxShadow: "0 8px 32px rgba(0,0,0,0.10)", maxWidth: 520, width: "100%", overflow: "hidden" };

  if (submitted) return (
    <div style={{ maxWidth: 520, width: "100%", background: "#fff", borderRadius: 20, boxShadow: "0 8px 32px rgba(0,0,0,0.10)", padding: "32px 24px", textAlign: "center" }}>
      <div style={{ fontSize: 60, marginBottom: 12 }}>🏆</div>
      <h1 style={{ margin: "0 0 8px", fontSize: 26, fontWeight: 900, color: "#1b5e20" }}>Amazing work, {playerName}!</h1>
      <p style={{ color: "#555", fontSize: 15, marginBottom: 24 }}>Your answers have been sent to your coach. Keep up the great effort on and off the pitch!</p>
      {sections.map(s => (
        <div key={s.id} style={{ background: s.color, border: `2px solid ${s.accent}`, borderRadius: 12, padding: "12px 14px", marginBottom: 10, textAlign: "left" }}>
          <div style={{ fontSize: 18 }}>{s.emoji}</div>
          <div style={{ fontWeight: 800, fontSize: 14, color: s.accent, marginBottom: 6 }}>{s.title}</div>
          {s.questions.map(q => (
            <div key={q.id} style={{ fontSize: 13, color: "#444", marginBottom: 3 }}>
              {q.type === "emoji"
                ? (emojiOptions.find(o => o.value === answers[q.id])?.icon + " " + answers[q.id])
                : answers[q.id]}
            </div>
          ))}
        </div>
      ))}
      <button style={{ marginTop: 12, padding: "12px 28px", borderRadius: 12, border: "none", background: "#1b5e20", color: "#fff", fontSize: 15, fontWeight: 700, cursor: "pointer" }}
        onClick={() => { setSubmitted(false); setAnswers({}); setPlayerName(""); setCurrentSection(0); }}>
        Start again
      </button>
    </div>
  );

  return (
    <div style={cardStyle}>
      {/* Header */}
      <div style={{ background: "linear-gradient(135deg, #1b5e20, #0d47a1)", color: "#fff", textAlign: "center", padding: "28px 24px 20px" }}>
        <div style={{ fontSize: 40, marginBottom: 8 }}>🏉</div>
        <h1 style={{ fontSize: 22, fontWeight: 800, letterSpacing: -0.5 }}>My Rugby Season Check-In</h1>
        <p style={{ margin: "6px 0 0", fontSize: 13, opacity: 0.8, fontWeight: 500 }}>Mid-Season Self-Review · Under 9s</p>
      </div>

      {/* Name */}
      {currentSection === 0 && (
        <div style={{ padding: "20px 24px 0" }}>
          <label style={{ display: "block", fontWeight: 700, fontSize: 16, marginBottom: 8, color: "#333" }}>👋 What's your name?</label>
          <input style={{ width: "100%", padding: "12px 14px", fontSize: 16, borderRadius: 10, border: "2px solid #1b5e20", outline: "none", fontFamily: "inherit" }}
            type="text" placeholder="Type your name here..." value={playerName} onChange={e => setPlayerName(e.target.value)} />
        </div>
      )}

      {/* Progress */}
      <div style={{ padding: "16px 24px 0", display: "flex", alignItems: "center", gap: 10 }}>
        <div style={{ flex: 1, height: 8, background: "#e0e0e0", borderRadius: 99, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${progress()}%`, background: "linear-gradient(90deg, #2e7d32, #1565c0)", borderRadius: 99, transition: "width 0.4s ease" }} />
        </div>
        <span style={{ fontSize: 12, color: "#888", fontWeight: 600, whiteSpace: "nowrap" }}>{progress()}% done</span>
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", gap: 6, padding: "14px 24px", overflowX: "auto" }}>
        {sections.map((s, i) => (
          <button key={s.id} onClick={() => setCurrentSection(i)}
            style={{ border: "none", borderRadius: 10, padding: "8px 12px", fontSize: 18, cursor: "pointer", flexShrink: 0, background: i === currentSection ? s.accent : "#f0f0f0", color: i === currentSection ? "#fff" : "#666", transition: "all 0.2s" }}>
            {s.emoji}
          </button>
        ))}
      </div>

      {/* Section */}
      <div style={{ margin: "0 16px 16px", borderRadius: 14, padding: "18px 16px", background: section.color }}>
        <h2 style={{ margin: "0 0 16px", fontSize: 18, fontWeight: 800, color: section.accent }}>{section.emoji} {section.title}</h2>
        {section.questions.map(q => (
          <div key={q.id} style={{ marginBottom: 18 }}>
            <p style={{ margin: "0 0 10px", fontSize: 15, fontWeight: 600, color: "#333", lineHeight: 1.4 }}>{q.text}</p>
            {q.type === "emoji" ? (
              <div style={{ display: "flex", gap: 8 }}>
                {emojiOptions.map(opt => (
                  <button key={opt.value} onClick={() => setAnswer(q.id, opt.value)}
                    style={{ flex: 1, border: `2px solid ${section.accent}`, borderRadius: 12, padding: "10px 6px", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 4, transition: "all 0.15s", fontFamily: "inherit", background: answers[q.id] === opt.value ? section.accent : "#fff", color: answers[q.id] === opt.value ? "#fff" : "#333", transform: answers[q.id] === opt.value ? "scale(1.08)" : "scale(1)" }}>
                    <span style={{ fontSize: 22 }}>{opt.icon}</span>
                    <span style={{ fontSize: 11, fontWeight: 700 }}>{opt.label}</span>
                  </button>
                ))}
              </div>
            ) : (
              <textarea style={{ width: "100%", padding: "10px 12px", fontSize: 14, borderRadius: 10, border: `2px solid ${section.accent}`, outline: "none", fontFamily: "inherit", resize: "none", lineHeight: 1.5, background: "#fff" }}
                placeholder={q.placeholder} value={answers[q.id] || ""} onChange={e => setAnswer(q.id, e.target.value)} rows={2} />
            )}
          </div>
        ))}
      </div>

      {error && <p style={{ color: "#c62828", fontSize: 13, padding: "0 16px", marginBottom: 4 }}>⚠️ {error}</p>}

      {/* Nav */}
      <div style={{ display: "flex", justifyContent: "space-between", padding: "4px 16px 20px", gap: 12 }}>
        {currentSection > 0 && (
          <button onClick={() => setCurrentSection(c => c - 1)}
            style={{ padding: "12px 20px", borderRadius: 12, border: "2px solid #ccc", background: "#fff", fontSize: 15, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", color: "#555" }}>
            ← Back
          </button>
        )}
        {!isLast ? (
          <button onClick={() => sectionComplete() && setCurrentSection(c => c + 1)}
            style={{ flex: 1, padding: "12px 20px", borderRadius: 12, border: "none", color: "#fff", fontSize: 15, fontWeight: 800, fontFamily: "inherit", background: sectionComplete() ? section.accent : "#ccc", cursor: sectionComplete() ? "pointer" : "not-allowed" }}>
            Next →
          </button>
        ) : (
          <button onClick={handleSubmit}
            style={{ flex: 1, padding: "12px 20px", borderRadius: 12, border: "none", color: "#fff", fontSize: 16, fontWeight: 800, fontFamily: "inherit", background: allAnswered() && !sending ? "#2e7d32" : "#ccc", cursor: allAnswered() && !sending ? "pointer" : "not-allowed" }}>
            {sending ? "Sending... ⏳" : "⭐ Finish!"}
          </button>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
